<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Routing Engine</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; color: #333; display: flex; justify-content: center; padding: 40px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #0070f3; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px;}
        button:hover { background-color: #005bb5; }
        #result-box { margin-top: 20px; padding: 15px; border-radius: 6px; background-color: #282c34; color: #61dafb; font-family: monospace; font-size: 13px; white-space: pre-wrap; display: none; }
        .error-text { color: #ff6b6b; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Live Payment Gateway</h2>
    
    <div class="form-group">
        <label>User ID</label>
        <input type="text" id="user_id" value="jayanth_test_user">
    </div>

    <div class="form-group">
        <label>Receiver VPA (UPI ID)</label>
        <input type="text" id="receiver_vpa" placeholder="e.g., merchant@sbi" value="merchant@sbi">
    </div>

    <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="amount" value="1500">
    </div>

    <div class="form-group" style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>Sender Bank</label>
            <select id="sender_bank">
                <option value="HDFC">HDFC</option>
                <option value="SBI">SBI</option>
                <option value="ICICI">ICICI</option>
                <option value="AXIS">AXIS</option>
            </select>
        </div>
        <div style="flex: 1;">
            <label>Receiver Bank</label>
            <select id="receiver_bank">
                <option value="ICICI">ICICI</option>
                <option value="SBI">SBI</option>
                <option value="HDFC">HDFC</option>
                <option value="AXIS">AXIS</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>Transaction Priority (1-100)</label>
        <input type="number" id="priority" value="10">
    </div>

    <button onclick="sendPayment()">Process Payment</button>

    <div id="result-box"></div>
</div>

<script>
    async function sendPayment() {
        const resultBox = document.getElementById('result-box');
        resultBox.style.display = 'block';
        resultBox.innerHTML = 'Routing transaction...';
        resultBox.className = '';

        // Gather data from the form
        const payload = {
            user_id: document.getElementById('user_id').value,
            receiver_vpa: document.getElementById('receiver_vpa').value,
            amount: parseFloat(document.getElementById('amount').value),
            sender_bank: document.getElementById('sender_bank').value,
            receiver_bank: document.getElementById('receiver_bank').value,
            priority: parseInt(document.getElementById('priority').value)
        };

        try {
            // Send POST request to your local FastAPI server
            const response = await fetch('http://localhost:8000/process-payment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            // Display success or error
            if (response.ok) {
                resultBox.style.color = "#a6e22e"; // Greenish for success
                resultBox.innerHTML = JSON.stringify(data, null, 2);
            } else {
                resultBox.style.color = "#f92672"; // Reddish for errors
                resultBox.innerHTML = `Error ${response.status}: ${data.detail}`;
            }
        } catch (error) {
            resultBox.style.color = "#f92672";
            resultBox.innerHTML = 'Failed to connect to the backend server. Is main.py running?';
        }
    }
</script>

</body>
</html>
